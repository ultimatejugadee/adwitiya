<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem("adwitiya_theme") || "light";
            document.documentElement.setAttribute("data-theme", savedTheme);
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adwitiya - Investor Entity Classification</title>

    <style>
        :root {
            --bg1: #f0f7ff;
            --bg2: #e0efff;
            --radial1: rgba(14, 165, 233, 0.12);
            --radial2: rgba(139, 92, 246, 0.12);
            --card-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.55));
            --card-border: rgba(15, 23, 42, 0.08);
            --text: #1e293b;
            --muted: #475569;
            --label-text: #1e293b;
            --accent: #0284c7;
            --accent2: #7c3aed;
            --success: #059669;
            --warning: #d97706;
            --danger: #e11d48;
            --input: rgba(255, 255, 255, 0.95);
            --input-text: #1e293b;
            --input-border: rgba(15, 23, 42, 0.15);
            --shadow: 0 25px 80px rgba(15, 23, 42, 0.08);
            --radius: 24px;
            
            --btn-bg: rgba(15, 23, 42, 0.08);
            --btn-border: rgba(15, 23, 42, 0.15);
            
            --autocomplete-bg: rgba(255, 255, 255, 0.98);
            --autocomplete-text: #1e293b;
            --autocomplete-border: rgba(15, 23, 42, 0.15);
            --autocomplete-hover: rgba(15, 23, 42, 0.05);
            --option-border: rgba(15, 23, 42, 0.08);
            --path-color: #0f172a;
            --path-span: #2563eb;
            --opt-desc-color: #475569;
            --child-bg: rgba(15, 23, 42, 0.02);
            --child-path-color: #334155;
            
            --message-text: #1e293b;
            --message-border: rgba(15, 23, 42, 0.1);
            --message-bg: rgba(15, 23, 42, 0.04);
            
            --box-bg: rgba(255, 255, 255, 0.65);
            --box-border: rgba(15, 23, 42, 0.08);
            
            --reg-text: #334155;
            --reg-strong: #0f172a;
            
            --pill-text: #0369a1;
            --pill-bg: rgba(125, 211, 252, 0.25);
            --pill-border: rgba(125, 211, 252, 0.6);
            
            --info-icon-bg: rgba(125, 211, 252, 0.25);
            --info-icon-text: #0369a1;
            --info-icon-hover-bg: #0284c7;
            --info-icon-hover-text: #ffffff;
            
            --slider-bg: rgba(15, 23, 42, 0.1);
            --slider-border: rgba(15, 23, 42, 0.15);
        }

        [data-theme="dark"] {
            --bg1: #07111f;
            --bg2: #10243f;
            --radial1: rgba(125, 211, 252, 0.22);
            --radial2: rgba(167, 139, 250, 0.22);
            --card-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
            --card-border: rgba(255, 255, 255, 0.22);
            --text: #f8fbff;
            --muted: #b9c7d9;
            --label-text: #e5efff;
            --accent: #7dd3fc;
            --accent2: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #fb7185;
            --input: rgba(255, 255, 255, 0.95);
            --input-text: #122033;
            --input-border: rgba(15, 23, 42, 0.06);
            --shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            
            --btn-bg: rgba(255, 255, 255, 0.15);
            --btn-border: rgba(255, 255, 255, 0.22);
            
            --autocomplete-bg: #10243f;
            --autocomplete-text: #f8fbff;
            --autocomplete-border: rgba(255, 255, 255, 0.2);
            --autocomplete-hover: rgba(255, 255, 255, 0.1);
            --option-border: rgba(255, 255, 255, 0.08);
            --path-color: #f8fbff;
            --path-span: #60a5fa;
            --opt-desc-color: #cbd5e1;
            --child-bg: rgba(255, 255, 255, 0.03);
            --child-path-color: #cbd5e1;
            
            --message-text: #eaf6ff;
            --message-border: rgba(255, 255, 255, 0.16);
            --message-bg: rgba(255, 255, 255, 0.08);
            
            --box-bg: rgba(255, 255, 255, 0.08);
            --box-border: rgba(255, 255, 255, 0.16);
            
            --reg-text: #dbeafe;
            --reg-strong: #ffffff;
            
            --pill-text: #e0f2fe;
            --pill-bg: rgba(125, 211, 252, 0.16);
            --pill-border: rgba(125, 211, 252, 0.32);
            
            --info-icon-bg: rgba(125, 211, 252, 0.16);
            --info-icon-text: #7dd3fc;
            --info-icon-hover-bg: #7dd3fc;
            --info-icon-hover-text: #07111f;
            
            --slider-bg: rgba(255, 255, 255, 0.22);
            --slider-border: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, var(--radial1), transparent 30%),
                radial-gradient(circle at 85% 10%, var(--radial2), transparent 30%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.18;
            z-index: 0;
            animation: float 12s ease-in-out infinite alternate;
        }

        .orb.one {
            width: 260px;
            height: 260px;
            background: var(--accent);
            left: -80px;
            bottom: 80px;
        }

        .orb.two {
            width: 320px;
            height: 320px;
            background: var(--accent2);
            right: -100px;
            bottom: -40px;
            animation-delay: 2s;
        }

        @keyframes float {
            from {
                transform: translateY(0) translateX(0);
            }

            to {
                transform: translateY(-35px) translateX(25px);
            }
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 70px;
        }

        .hero {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(16px);
            color: #dbeafe;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(32px, 6vw, 62px);
            line-height: 1;
            letter-spacing: -0.055em;
        }

        .subtitle {
            max-width: 780px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.65;
        }

        .app-card {
            margin-top: 34px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(22px);
        }

        .card-top {
            padding: 24px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            gap: 16px;
            flex-wrap: wrap;
            border-top-left-radius: calc(var(--radius) - 1px);
            border-top-right-radius: calc(var(--radius) - 1px);
        }

        .card-title {
            font-size: 20px;
            font-weight: 750;
            letter-spacing: -0.02em;
        }

        .data-status {
            font-size: 13px;
            color: var(--muted);
        }

        .form {
            padding: 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .full {
            grid-column: 1 / -1;
        }

        .field {
            position: relative;
        }

        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--label-text);
            font-weight: 650;
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            font-weight: 450;
        }

        input,
        select {
            width: 100%;
            border: 0;
            outline: none;
            border-radius: 16px;
            padding: 16px 16px;
            background: var(--input);
            color: var(--input-text);
            font-size: 16px;
            box-shadow:
                inset 0 0 0 1px var(--input-border),
                0 10px 28px rgba(0, 0, 0, 0.16);
            transition: transform 0.18s ease, box-shadow 0.18s ease, outline 0.18s ease;
        }

        #pan.state-blank {
            outline: 3px solid var(--warning);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }
        [data-theme="light"] #pan.state-blank {
            outline: 3px solid var(--warning);
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }
        #pan.state-invalid {
            outline: 3px solid var(--danger);
            box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }
        [data-theme="light"] #pan.state-invalid {
            outline: 3px solid var(--danger);
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }
        #pan.state-valid {
            outline: 3px solid var(--success);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }
        [data-theme="light"] #pan.state-valid {
            outline: 3px solid var(--success);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2), 0 10px 28px rgba(0, 0, 0, 0.16);
        }

        input:focus,
        select:focus {
            transform: translateY(-1px);
        }

        #pan {
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 800;
        }

        .message {
            margin-top: 12px;
            border-radius: 16px;
            padding: 14px 15px;
            font-size: 14px;
            line-height: 1.55;
            color: var(--message-text);
            border: 1px solid var(--message-border);
            background: var(--message-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .message.good {
            border-color: rgba(52, 211, 153, 0.45);
            background: rgba(52, 211, 153, 0.13);
        }
        [data-theme="light"] .message.good {
            border-color: rgba(5, 150, 105, 0.45);
            background: rgba(5, 150, 105, 0.12);
            color: #065f46;
        }

        .message.warn {
            border-color: rgba(251, 191, 36, 0.45);
            background: rgba(251, 191, 36, 0.12);
        }
        [data-theme="light"] .message.warn {
            border-color: rgba(217, 119, 6, 0.45);
            background: rgba(217, 119, 6, 0.12);
            color: #92400e;
        }

        .message.bad {
            border-color: rgba(251, 113, 133, 0.45);
            background: rgba(251, 113, 133, 0.12);
        }
        [data-theme="light"] .message.bad {
            border-color: rgba(225, 29, 72, 0.45);
            background: rgba(225, 29, 72, 0.12);
            color: #9f1239;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid var(--box-border);
            background: var(--box-bg);
        }

        .toggle-copy {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 62px;
            height: 34px;
            flex: 0 0 auto;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--slider-bg);
            border-radius: 999px;
            transition: 0.25s;
            border: 1px solid var(--slider-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.25s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.24);
        }

        .switch input:checked+.slider {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }

        .switch input:checked+.slider:before {
            transform: translateX(27px);
        }

        .lang-select {
            width: auto;
            border: 0;
            outline: none;
            border-radius: 8px;
            padding: 4px 8px;
            background: var(--btn-bg);
            color: var(--text);
            font-size: 13px;
            box-shadow: none;
            border: 1px solid var(--btn-border);
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .lang-select:focus {
            background: rgba(255, 255, 255, 0.25);
            transform: none;
        }
        [data-theme="light"] .lang-select:focus {
            background: rgba(15, 23, 42, 0.12);
        }

        .lang-select option {
            background: var(--bg2);
            color: var(--text);
        }

        .theme-toggle-btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .theme-toggle-btn:hover {
            background: rgba(15, 23, 42, 0.12);
        }

        [data-theme="dark"] .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .autocomplete {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 8px);
            z-index: 20;
            max-height: 360px;
            overflow: auto;
            background: var(--autocomplete-bg);
            color: var(--autocomplete-text);
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
            border: 1px solid var(--autocomplete-border);
            display: none;
        }

        .autocomplete.show {
            display: block;
        }

        .option {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--option-border);
        }

        .option:hover {
            background: var(--autocomplete-hover);
        }

        .path {
            font-weight: 800;
            font-size: 14px;
            color: var(--path-color);
        }

        .path span {
            color: var(--path-span);
        }

        .opt-desc {
            font-size: 13px;
            line-height: 1.45;
            color: var(--opt-desc-color);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
            transition: max-height 0s 1s, opacity 0s 1s, margin-top 0s 1s;
        }

        .option:hover .opt-desc {
            max-height: 200px;
            opacity: 1;
            margin-top: 5px;
        }

        .info-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--info-icon-bg);
            color: var(--info-icon-text);
            font-size: 12px;
            font-style: italic;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .info-icon:hover {
            background: var(--info-icon-hover-bg);
            color: var(--info-icon-hover-text);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: var(--bg2);
            margin: 15% auto;
            padding: 20px 24px;
            border: 1px solid var(--card-border);
            width: 80%;
            max-width: 500px;
            border-radius: var(--radius);
            color: var(--text);
            position: relative;
            box-shadow: var(--shadow);
            line-height: 1.5;
        }

        .close-modal {
            color: var(--muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close-modal:hover,
        .close-modal:focus {
            color: white;
            text-decoration: none;
        }
        [data-theme="light"] .close-modal:hover,
        [data-theme="light"] .close-modal:focus {
            color: black;
        }

        .option.child {
            padding-left: 36px;
            background: var(--child-bg);
        }

        .option.child .path {
            font-size: 13px;
            font-weight: 600;
            color: var(--child-path-color);
        }

        .option.child .opt-desc {
            font-size: 12px;
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .pill {
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: var(--pill-text);
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .info-box {
            border-radius: 18px;
            padding: 18px;
            border: 1px solid var(--box-border);
            background: var(--box-bg);
            min-height: 132px;
        }

        .info-box h3 {
            margin: 0 0 9px;
            font-size: 16px;
            letter-spacing: -0.01em;
        }

        .info-box p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .registration {
            margin-top: 12px;
            color: var(--reg-text);
            font-size: 13px;
        }

        .registration strong {
            color: var(--reg-strong);
        }

        .footer-note {
            padding: 18px 28px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        mark {
            background: rgba(125, 211, 252, 0.35);
            color: inherit;
            padding: 0 3px;
            border-radius: 4px;
        }

        @media (max-width: 780px) {

            .form,
            .details {
                grid-template-columns: 1fr;
            }

            .card-top {
                padding: 20px;
            }

            .form {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <main class="page">
        <section class="hero">
            <h1 id="heroTitle">अद्वितीय (Adwitiya)</h1>
        </section>

        <section class="app-card">
            <div class="form">
                <div class="field full">
                    <label for="pan">
                        <span id="labelPan">PAN Number</span>
                        <span style="display: flex; align-items: center; gap: 16px;">
                            <span class="hint" id="labelFormat">Format: ABCDE1234F</span>
                            <span style="display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; cursor: pointer; user-select: none; color: var(--text); vertical-align: middle;">
                                <input type="checkbox" id="panExempted" style="width: 16px; height: 16px; margin: 0; cursor: pointer; vertical-align: middle;" />
                                <label for="panExempted" id="labelPanExempted" style="cursor: pointer; margin: 0; font-weight: 500; font-size: 13px; line-height: 1; vertical-align: middle;">PAN Exempted</label>
                            </span>
                            <select id="langSelect" class="lang-select" aria-label="Select Language">
                                <option value="en">English</option>
                                <option value="hi">हिंदी</option>
                            </select>
                            <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                                <span id="themeIcon">☀️</span>
                            </button>
                        </span>
                    </label>
                    <input id="pan" maxlength="10" placeholder="Enter PAN" autocomplete="off" class="state-blank" />
                    
                    <div id="exemptionContainer" style="display: none; flex-direction: column; gap: 12px; margin-top: 10px;">
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="exemptionCategorySelect" style="font-size: 13px; color: var(--muted); font-weight: 500;" id="labelExemptionCategory">Exemption Category</label>
                            <select id="exemptionCategorySelect">
                                <!-- Options will be populated dynamically -->
                            </select>
                        </div>
                        <div id="exemptionSubcategoryWrapper" style="display: none; flex-direction: column; gap: 6px;">
                            <label for="exemptionSubcategorySelect" style="font-size: 13px; color: var(--muted); font-weight: 500;" id="labelExemptionSubcategory">Exemption Sub-category</label>
                            <select id="exemptionSubcategorySelect">
                                <!-- Options will be populated dynamically -->
                            </select>
                        </div>
                    </div>

                    <div id="panMessage" class="message warn">
                        <span id="panMessageText">Enter a PAN to identify the fourth-character PAN category.</span>
                        <label class="switch" id="showAllContainer" aria-label="Show all categories" style="display: none; margin-left: auto;">
                            <input type="checkbox" id="showAll" />
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <label for="entityInput">
                        <span id="labelEntity">Entity Type</span>
                        <span id="labelEntityHint" class="hint">Search by name, alias, or keyword</span>
                    </label>
                    <input id="entityInput" placeholder="Type entity type, e.g. individual, trust, FPI"
                        autocomplete="off" />
                    <div id="autocomplete" class="autocomplete"></div>
                </div>

                <div class="field">
                    <label for="subtypeSelect">
                        <span id="labelSubtype">Additional Subcategory</span>
                        <span id="labelSubtypeHint" class="hint">Based on selected entity type</span>
                    </label>
                    <select id="subtypeSelect" disabled>
                        <option value="">Select entity type first</option>
                    </select>
                </div>

                <div class="full details">
                    <div class="info-box">
                        <h3 id="headingEntityDescription">Entity Type Description</h3>
                        <p id="entityDescription">Select an entity type to see its classification meaning.</p>
                        <div id="entityPills" class="pill-row"></div>
                    </div>

                    <div class="info-box">
                        <h3 id="headingSubtypeDescription">Subtype Description</h3>
                        <p id="subtypeDescription">Select a subcategory to see registration and details.</p>
                        <div id="registration" class="registration"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="descModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <p id="modalDescText" style="margin-top: 0; font-size: 15px;"></p>
        </div>
    </div>

    <script>
        const XML_FILE = "investor-entities.xml";
        const LABELS_FILE = "labels.xml";

        const panInput = document.getElementById("pan");
        const panExemptedToggle = document.getElementById("panExempted");
        const exemptionContainer = document.getElementById("exemptionContainer");
        const exemptionCategorySelect = document.getElementById("exemptionCategorySelect");
        const exemptionSubcategoryWrapper = document.getElementById("exemptionSubcategoryWrapper");
        const exemptionSubcategorySelect = document.getElementById("exemptionSubcategorySelect");
        const labelPanExempted = document.getElementById("labelPanExempted");
        const labelExemptionCategory = document.getElementById("labelExemptionCategory");
        const labelExemptionSubcategory = document.getElementById("labelExemptionSubcategory");
        const panMessage = document.getElementById("panMessage");
        const showAllToggle = document.getElementById("showAll");
        const entityInput = document.getElementById("entityInput");
        const autocomplete = document.getElementById("autocomplete");
        const subtypeSelect = document.getElementById("subtypeSelect");
        const entityDescription = document.getElementById("entityDescription");
        const subtypeDescription = document.getElementById("subtypeDescription");
        const registration = document.getElementById("registration");
        const entityPills = document.getElementById("entityPills");
        const dataStatus = document.getElementById("dataStatus");

        let panCategories = {};
        let entityTypes = [];
        let selectedEntity = null;
        let selectedSubtype = null;

        let currentLang = localStorage.getItem("adwitiya_lang") || "en";
        let currentTheme = localStorage.getItem("adwitiya_theme") || "light";
        
        let translations = {
            interface: {},
            panCategories: {},
            groups: {},
            entityTypes: {},
            subtypes: {}
        };

        function attr(node, name, fallback = "") {
            return node.getAttribute(name) || fallback;
        }

        function txt(node, selector) {
            const found = node.querySelector(selector);
            return found ? found.textContent.trim() : "";
        }

        function parseCSV(value) {
            return (value || "")
                .split(",")
                .map(v => v.trim())
                .filter(Boolean);
        }

        function cleanPAN(value) {
            return value.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 10);
        }

        function getCurrentPanChar() {
            const pan = panInput.value.trim().toUpperCase();
            return pan.length >= 4 ? pan[3] : "";
        }

        function isPANFormatValid(pan) {
            return /^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan);
        }

        function getAllowedExemptionPanChars() {
            if (!panExemptedToggle || !panExemptedToggle.checked) return [];
            const cat = exemptionCategorySelect.value;
            if (cat === "sikkim") return ['P'];
            if (cat === "micro") return ['P'];
            if (cat === "multilateral") return ['J', 'G'];
            if (cat === "official") {
                const sub = exemptionSubcategorySelect.value;
                if (sub === "govt") return ['G'];
                if (sub === "consular") return ['G', 'J'];
                if (sub === "court") return ['J', 'G', 'T'];
            }
            return [];
        }

        function canShowForPAN(panChars) {
            if (showAllToggle.checked) return true;

            if (panExemptedToggle && panExemptedToggle.checked) {
                const allowed = getAllowedExemptionPanChars();
                if (allowed.length === 0) return true;
                return panChars.some(char => allowed.includes(char));
            }

            const panChar = getCurrentPanChar();
            if (!panChar) return true;

            return panChars.includes(panChar);
        }

        function updatePANOutline() {
            const pan = panInput.value.trim().toUpperCase();
            panInput.classList.remove("state-blank", "state-invalid", "state-valid");
            if (!pan) {
                panInput.classList.add("state-blank");
            } else if (isPANFormatValid(pan)) {
                panInput.classList.add("state-valid");
            } else {
                panInput.classList.add("state-invalid");
            }
        }

        function t(id, variables = {}) {
            const entry = translations.interface[id];
            if (!entry) return "";
            let text = entry[currentLang] || entry["en"] || "";
            for (const [key, value] of Object.entries(variables)) {
                text = text.replace(`{${key}}`, value);
            }
            return text;
        }

        function getCategoryLabel(code) {
            const translation = translations.panCategories[code];
            if (translation && translation.label[currentLang]) {
                return translation.label[currentLang];
            }
            const localCat = panCategories[code];
            return localCat ? localCat.label : code;
        }

        function getCategoryDescription(code) {
            const translation = translations.panCategories[code];
            if (translation && translation.description[currentLang]) {
                return translation.description[currentLang];
            }
            const localCat = panCategories[code];
            return localCat ? localCat.description : "";
        }

        function getGroupName(id, fallbackName) {
            const translation = translations.groups[id];
            if (translation && translation.name[currentLang]) {
                return translation.name[currentLang];
            }
            return fallbackName;
        }

        function getEntityName(id, fallbackName) {
            const translation = translations.entityTypes[id];
            if (translation && translation.name[currentLang]) {
                return translation.name[currentLang];
            }
            return fallbackName;
        }

        function getEntityLegalStatus(id, fallbackStatus) {
            const translation = translations.entityTypes[id];
            if (translation && translation.legalStatus[currentLang]) {
                return translation.legalStatus[currentLang];
            }
            return fallbackStatus;
        }

        function getEntityDescription(id, fallbackDesc) {
            const translation = translations.entityTypes[id];
            if (translation && translation.description[currentLang]) {
                return translation.description[currentLang];
            }
            return fallbackDesc;
        }

        function getSubtypeName(id, fallbackName) {
            const translation = translations.subtypes[id];
            if (translation && translation.name[currentLang]) {
                return translation.name[currentLang];
            }
            return fallbackName;
        }

        function getSubtypeRegistration(id, fallbackReg) {
            const translation = translations.subtypes[id];
            if (translation && translation.registration[currentLang]) {
                return translation.registration[currentLang];
            }
            return fallbackReg;
        }

        function getSubtypeDescription(id, fallbackDesc) {
            const translation = translations.subtypes[id];
            if (translation && translation.description[currentLang]) {
                return translation.description[currentLang];
            }
            return fallbackDesc;
        }

        function populateExemptionDropdowns() {
            if (!exemptionCategorySelect) return;
            const catSelect = exemptionCategorySelect;
            const savedCatValue = catSelect.value;

            catSelect.innerHTML = "";
            
            // Add placeholder option
            const placeholderOpt = document.createElement("option");
            placeholderOpt.value = "";
            placeholderOpt.textContent = currentLang === "hi" ? "-- छूट श्रेणी चुनें --" : "-- Select Exemption Category --";
            catSelect.appendChild(placeholderOpt);

            const categories = [
                { id: "sikkim", labelKey: "exemption_sikkim_label" },
                { id: "micro", labelKey: "exemption_micro_label" },
                { id: "official", labelKey: "exemption_official_label" },
                { id: "multilateral", labelKey: "exemption_multilateral_label" }
            ];

            categories.forEach(cat => {
                const opt = document.createElement("option");
                opt.value = cat.id;
                opt.textContent = t(cat.labelKey);
                catSelect.appendChild(opt);
            });

            // Restore selection if it existed
            if (savedCatValue) {
                catSelect.value = savedCatValue;
            }

            populateExemptionSubcategory();
        }

        function populateExemptionSubcategory() {
            if (!exemptionSubcategorySelect) return;
            const subSelect = exemptionSubcategorySelect;
            const savedSubValue = subSelect.value;

            subSelect.innerHTML = "";

            const cat = exemptionCategorySelect.value;
            if (cat === "official") {
                exemptionSubcategoryWrapper.style.display = "flex";

                // Add placeholder
                const placeholderOpt = document.createElement("option");
                placeholderOpt.value = "";
                placeholderOpt.textContent = currentLang === "hi" ? "-- उप-श्रेणी चुनें --" : "-- Select Sub-category --";
                subSelect.appendChild(placeholderOpt);

                const subcategories = [
                    { id: "govt", labelKey: "exemption_govt_label" },
                    { id: "consular", labelKey: "exemption_consular_label" },
                    { id: "court", labelKey: "exemption_court_label" }
                ];

                subcategories.forEach(sub => {
                    const opt = document.createElement("option");
                    opt.value = sub.id;
                    opt.textContent = t(sub.labelKey);
                    subSelect.appendChild(opt);
                });

                if (savedSubValue) {
                    subSelect.value = savedSubValue;
                }
            } else {
                exemptionSubcategoryWrapper.style.display = "none";
            }
        }

        function translateUI() {
            document.title = t("app_title") || "Adwitiya - Investor Entity Classification";
            
            const heroTitle = document.getElementById("heroTitle");
            if (heroTitle) heroTitle.innerHTML = t("hero_title");
            
            const labelPan = document.getElementById("labelPan");
            if (labelPan) labelPan.textContent = t("pan_label");
            
            const labelFormat = document.getElementById("labelFormat");
            if (labelFormat) labelFormat.textContent = t("pan_hint");
            
            panInput.placeholder = t("pan_placeholder");
            
            const showAllContainer = document.getElementById("showAllContainer");
            if (showAllContainer) showAllContainer.setAttribute("aria-label", t("show_all_aria"));
            
            const labelEntity = document.getElementById("labelEntity");
            if (labelEntity) labelEntity.textContent = t("entity_label");
            
            const labelEntityHint = document.getElementById("labelEntityHint");
            if (labelEntityHint) labelEntityHint.textContent = t("entity_hint");
            
            if (!selectedEntity) {
                entityInput.placeholder = t("entity_placeholder");
            } else {
                entityInput.value = getEntityName(selectedEntity.id, selectedEntity.name);
            }
            
            const labelSubtype = document.getElementById("labelSubtype");
            if (labelSubtype) labelSubtype.textContent = t("subtype_label");
            
            const labelSubtypeHint = document.getElementById("labelSubtypeHint");
            if (labelSubtypeHint) labelSubtypeHint.textContent = t("subtype_hint");
            
            const headingEntityDescription = document.getElementById("headingEntityDescription");
            if (headingEntityDescription) headingEntityDescription.textContent = t("desc_entity_title");
            
            const headingSubtypeDescription = document.getElementById("headingSubtypeDescription");
            if (headingSubtypeDescription) headingSubtypeDescription.textContent = t("desc_subtype_title");

            if (labelPanExempted) labelPanExempted.textContent = t("pan_exempted_label");
            if (labelExemptionCategory) labelExemptionCategory.textContent = t("exemption_category_label");
            if (labelExemptionSubcategory) labelExemptionSubcategory.textContent = t("exemption_subcategory_label");
            populateExemptionDropdowns();
            if (typeof updateThemeUI === "function") {
                updateThemeUI();
            }
        }

        function updatePANMessage() {
            const showAllContainer = document.getElementById("showAllContainer");
            const panMessageText = document.getElementById("panMessageText");

            if (panExemptedToggle && panExemptedToggle.checked) {
                panMessage.className = "message good";
                showAllContainer.style.display = "none";
                
                const cat = exemptionCategorySelect.value;
                if (cat === "sikkim") {
                    panMessageText.innerHTML = t("exemption_sikkim_desc");
                } else if (cat === "micro") {
                    panMessageText.innerHTML = t("exemption_micro_desc");
                } else if (cat === "multilateral") {
                    panMessageText.innerHTML = t("exemption_multilateral_desc");
                } else if (cat === "official") {
                    const sub = exemptionSubcategorySelect.value;
                    if (sub === "govt") {
                        panMessageText.innerHTML = t("exemption_govt_desc");
                    } else if (sub === "consular") {
                        panMessageText.innerHTML = t("exemption_consular_desc");
                    } else if (sub === "court") {
                        panMessageText.innerHTML = t("exemption_court_desc");
                    } else {
                        panMessageText.innerHTML = t("exemption_select_prompt");
                    }
                } else {
                    panMessageText.innerHTML = t("exemption_select_prompt");
                }
                
                panInput.classList.remove("state-blank", "state-invalid", "state-valid");
                return;
            }

            const pan = panInput.value.trim().toUpperCase();
            const fourth = getCurrentPanChar();

            updatePANOutline();

            if (!pan) {
                panMessage.className = "message warn";
                panMessageText.innerHTML = t("msg_enter_pan");
                showAllContainer.style.display = "none";
                showAllToggle.checked = false;
                return;
            }

            if (pan.length < 10) {
                panMessage.className = "message warn";
                panMessageText.innerHTML = t("msg_pan_incomplete");
                showAllContainer.style.display = "none";
                showAllToggle.checked = false;
            } else if (!isPANFormatValid(pan)) {
                panMessage.className = "message bad";
                panMessageText.innerHTML = t("msg_pan_invalid");
                showAllContainer.style.display = "none";
                showAllToggle.checked = false;
            } else {
                panMessage.className = "message good";
                showAllContainer.style.display = "inline-block";

                if (fourth) {
                    const catLabel = getCategoryLabel(fourth);
                    if (translations.panCategories[fourth] || panCategories[fourth]) {
                        panMessageText.innerHTML = t("msg_pan_valid_classified", { category: catLabel });
                    } else {
                        panMessageText.innerHTML = t("msg_pan_valid_unmapped", { char: fourth });
                    }
                } else {
                    panMessageText.innerHTML = t("msg_pan_valid");
                }
            }
        }

        async function loadLabelsXML() {
            try {
                const res = await fetch(LABELS_FILE);
                if (!res.ok) throw new Error("Labels file not found");
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "application/xml");

                if (xml.querySelector("parsererror")) {
                    throw new Error("Invalid labels XML format");
                }

                function queryText(node, selector) {
                    const found = node.querySelector(selector);
                    return found ? found.textContent.trim() : "";
                }

                xml.querySelectorAll("interface > label").forEach(node => {
                    const id = attr(node, "id");
                    translations.interface[id] = {
                        en: queryText(node, "en"),
                        hi: queryText(node, "hi")
                    };
                });

                xml.querySelectorAll("panCategories > panCategory").forEach(node => {
                    const code = attr(node, "code");
                    translations.panCategories[code] = {
                        label: {
                            en: queryText(node, "label > en"),
                            hi: queryText(node, "label > hi")
                        },
                        description: {
                            en: queryText(node, "description > en"),
                            hi: queryText(node, "description > hi")
                        }
                    };
                });

                xml.querySelectorAll("groups > group").forEach(node => {
                    const id = attr(node, "id");
                    translations.groups[id] = {
                        name: {
                            en: queryText(node, "name > en"),
                            hi: queryText(node, "name > hi")
                        }
                    };
                });

                xml.querySelectorAll("entityTypes > entityType").forEach(node => {
                    const id = attr(node, "id");
                    translations.entityTypes[id] = {
                        name: {
                            en: queryText(node, "name > en"),
                            hi: queryText(node, "name > hi")
                        },
                        legalStatus: {
                            en: queryText(node, "legalStatus > en"),
                            hi: queryText(node, "legalStatus > hi")
                        },
                        description: {
                            en: queryText(node, "description > en"),
                            hi: queryText(node, "description > hi")
                        }
                    };
                });

                xml.querySelectorAll("subtypes > subtype").forEach(node => {
                    const id = attr(node, "id");
                    translations.subtypes[id] = {
                        name: {
                            en: queryText(node, "name > en"),
                            hi: queryText(node, "name > hi")
                        },
                        registration: {
                            en: queryText(node, "registration > en"),
                            hi: queryText(node, "registration > hi")
                        },
                        description: {
                            en: queryText(node, "description > en"),
                            hi: queryText(node, "description > hi")
                        }
                    };
                });
            } catch (err) {
                console.error("Failed to load translations:", err);
            }
        }

        async function loadXML() {
            try {
                await loadLabelsXML();
                translateUI();

                const res = await fetch(XML_FILE);
                if (!res.ok) throw new Error("XML file not found");
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "application/xml");

                if (xml.querySelector("parsererror")) {
                    throw new Error("Invalid XML format");
                }

                xml.querySelectorAll("panCategory").forEach(node => {
                    panCategories[attr(node, "code")] = {
                        label: attr(node, "label"),
                        description: node.textContent.trim()
                    };
                });

                entityTypes = [];

                xml.querySelectorAll("group").forEach(group => {
                    const groupId = attr(group, "id");
                    const groupName = attr(group, "name");

                    group.querySelectorAll(":scope > entityType").forEach(entityNode => {
                        const entity = {
                            groupId: groupId,
                            group: groupName,
                            id: attr(entityNode, "id"),
                            name: attr(entityNode, "name"),
                            legalStatus: attr(entityNode, "legalStatus"),
                            panChars: parseCSV(attr(entityNode, "panChars")),
                            aliases: parseCSV(txt(entityNode, "aliases")),
                            description: txt(entityNode, "description"),
                            subtypes: []
                        };

                        entityNode.querySelectorAll(":scope > subtypes > subtype").forEach(subNode => {
                            entity.subtypes.push({
                                id: attr(subNode, "id"),
                                name: attr(subNode, "name"),
                                panChars: parseCSV(attr(subNode, "panChars")) || entity.panChars,
                                registration: attr(subNode, "registration"),
                                description: txt(subNode, "description"),
                                keywords: parseCSV(txt(subNode, "keywords"))
                            });
                        });

                        entityTypes.push(entity);
                    });
                });

                if (dataStatus) {
                    dataStatus.textContent = t("status_loaded", { count: entityTypes.length });
                    dataStatus.style.color = "#bbf7d0";
                }
                refreshUI();
            } catch (err) {
                if (dataStatus) {
                    dataStatus.textContent = t("status_error", { file: XML_FILE });
                    dataStatus.style.color = "#fecdd3";
                }
                console.error(err);
            }
        }

        function getSuggestionRecords() {
            const rows = [];

            entityTypes.forEach(entity => {
                const entityAllowed = canShowForPAN(entity.panChars);

                if (entityAllowed) {
                    const rawGroupEn = entity.group;
                    const rawGroupHi = getGroupName(entity.groupId, "");
                    const rawNameEn = entity.name;
                    const rawNameHi = getEntityName(entity.id, "");
                    const rawStatusEn = entity.legalStatus;
                    const rawStatusHi = getEntityLegalStatus(entity.id, "");
                    const rawDescEn = entity.description;
                    const rawDescHi = getEntityDescription(entity.id, "");

                    rows.push({
                        entity,
                        subtype: null,
                        isParent: true,
                        searchable: [
                            rawGroupEn, rawGroupHi,
                            rawNameEn, rawNameHi,
                            rawStatusEn, rawStatusHi,
                            rawDescEn, rawDescHi,
                            entity.aliases.join(" ")
                        ].join(" ").toLowerCase()
                    });
                }

                entity.subtypes.forEach(subtype => {
                    const subtypeAllowed = canShowForPAN(subtype.panChars);

                    if (entityAllowed || subtypeAllowed) {
                        const rawNameEn = subtype.name;
                        const rawNameHi = getSubtypeName(subtype.id, "");
                        const rawDescEn = subtype.description;
                        const rawDescHi = getSubtypeDescription(subtype.id, "");
                        const rawRegEn = subtype.registration;
                        const rawRegHi = getSubtypeRegistration(subtype.id, "");

                        rows.push({
                            entity,
                            subtype,
                            isParent: false,
                            searchable: [
                                rawNameEn, rawNameHi,
                                rawDescEn, rawDescHi,
                                rawRegEn, rawRegHi,
                                subtype.keywords.join(" ")
                            ].join(" ").toLowerCase()
                        });
                    }
                });
            });

            return rows;
        }

        function highlight(text, query) {
            if (!query) return text;
            const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            return text.replace(new RegExp(`(${safe})`, "ig"), "<mark>$1</mark>");
        }

        function renderSuggestions() {
            const query = entityInput.value.trim().toLowerCase();
            const doFilter = query.length > 2;
            const highlightQuery = doFilter ? query : "";
            const records = getSuggestionRecords()
                .filter(row => !doFilter || row.searchable.includes(query))
                .slice(0, 100);

            autocomplete.innerHTML = "";

            if (!records.length) {
                autocomplete.innerHTML = `
                  <div class="option">
                    <div class="path">${t("no_category_found")}</div>
                    <div class="opt-desc" style="max-height: 200px; opacity: 1; margin-top: 5px;">${t("no_category_hint")}</div>
                  </div>
                `;
                autocomplete.classList.add("show");
                return;
            }

            records.forEach(row => {
                const div = document.createElement("div");
                div.className = "option" + (row.isParent ? " parent" : " child");

                const rawName = row.isParent 
                    ? getEntityName(row.entity.id, row.entity.name) 
                    : getSubtypeName(row.subtype.id, row.subtype.name);
                
                const rawGroup = row.isParent 
                    ? getGroupName(row.entity.groupId, row.entity.group) 
                    : "";

                const rawDesc = row.isParent 
                    ? getEntityDescription(row.entity.id, row.entity.description) 
                    : (getSubtypeDescription(row.subtype.id, row.subtype.description) || getEntityDescription(row.entity.id, row.entity.description));

                const descMatches = doFilter && rawDesc.toLowerCase().includes(query);
                
                const descText = highlight(rawDesc, highlightQuery);
                const descStyle = descMatches ? ' style="max-height: 200px; opacity: 1; margin-top: 5px;"' : '';

                if (row.isParent) {
                    div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="path">
                          ${highlight(rawGroup, highlightQuery)}
                          <span>▸</span>
                          ${highlight(rawName, highlightQuery)}
                        </div>
                        <div class="info-icon" title="${t("view_desc_tooltip")}">i</div>
                    </div>
                    <div class="opt-desc"${descStyle}>${descText}</div>
                  `;
                } else {
                    div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="path">
                          ${highlight(rawName, highlightQuery)}
                        </div>
                        <div class="info-icon" title="${t("view_desc_tooltip")}">i</div>
                    </div>
                    <div class="opt-desc"${descStyle}>${descText}</div>
                  `;
                }

                const infoIcon = div.querySelector(".info-icon");
                infoIcon.addEventListener("mousedown", e => {
                    e.preventDefault();
                    e.stopPropagation();
                    const modal = document.getElementById("descModal");
                    document.getElementById("modalDescText").textContent = rawDesc || "No description available.";
                    modal.style.display = "block";
                });

                div.addEventListener("mousedown", e => {
                    e.preventDefault();
                    selectEntityAndSubtype(row.entity.id, row.subtype ? row.subtype.id : null);
                    autocomplete.classList.remove("show");
                });
                autocomplete.appendChild(div);
            });

            autocomplete.classList.add("show");
        }

        function selectEntityAndSubtype(entityId, subtypeId) {
            selectedEntity = entityTypes.find(e => e.id === entityId) || null;
            if (!selectedEntity) return;

            selectedSubtype = selectedEntity.subtypes.find(s => s.id === subtypeId) || null;

            entityInput.value = getEntityName(selectedEntity.id, selectedEntity.name);
            populateSubtypeSelect();

            if (selectedSubtype) {
                subtypeSelect.value = selectedSubtype.id;
            }

            updateDescriptions();
        }

        function populateSubtypeSelect() {
            subtypeSelect.innerHTML = "";

            if (!selectedEntity) {
                subtypeSelect.disabled = true;
                subtypeSelect.innerHTML = `<option value="">${t("subtype_placeholder")}</option>`;
                return;
            }

            const visibleSubtypes = selectedEntity.subtypes.filter(sub =>
                showAllToggle.checked || canShowForPAN(sub.panChars)
            );

            subtypeSelect.disabled = false;

            if (!visibleSubtypes.length) {
                subtypeSelect.innerHTML = `<option value="">${t("subtype_no_compatible")}</option>`;
                return;
            }

            subtypeSelect.innerHTML = `<option value="">${t("subtype_choose")}</option>`;

            visibleSubtypes.forEach(sub => {
                const option = document.createElement("option");
                option.value = sub.id;
                option.textContent = getSubtypeName(sub.id, sub.name);
                subtypeSelect.appendChild(option);
            });
        }

        function updateDescriptions() {
            if (!selectedEntity) {
                entityDescription.textContent = t("desc_entity_default");
                subtypeDescription.textContent = t("desc_subtype_default");
                registration.innerHTML = "";
                entityPills.innerHTML = "";
                return;
            }

            entityDescription.textContent = getEntityDescription(selectedEntity.id, selectedEntity.description);

            entityPills.innerHTML = "";
            [
                t("pill_group", { value: getGroupName(selectedEntity.groupId, selectedEntity.group) }),
                t("pill_legal", { value: getEntityLegalStatus(selectedEntity.id, selectedEntity.legalStatus) }),
                t("pill_pan", { value: selectedEntity.panChars.join(" / ") })
            ].forEach(text => {
                const pill = document.createElement("span");
                pill.className = "pill";
                pill.textContent = text;
                entityPills.appendChild(pill);
            });

            if (!selectedSubtype) {
                subtypeDescription.textContent = t("desc_subtype_default");
                registration.innerHTML = "";
                return;
            }

            subtypeDescription.textContent = getSubtypeDescription(selectedSubtype.id, selectedSubtype.description);
            
            const regLabel = t("reg_identifier");
            const panLabel = t("reg_pan_mapping");
            const regVal = getSubtypeRegistration(selectedSubtype.id, selectedSubtype.registration) || "PAN / relevant registration";
            const panVal = selectedSubtype.panChars.join(" / ");
            
            registration.innerHTML = `
                <strong>${regLabel}:</strong> ${regVal}
                <br><strong>${panLabel}:</strong> ${panVal}
            `;
        }

        function refreshUI() {
            updatePANMessage();

            if (selectedEntity) {
                const stillVisible = showAllToggle.checked || canShowForPAN(selectedEntity.panChars);
                if (!stillVisible) {
                    selectedEntity = null;
                    selectedSubtype = null;
                    entityInput.value = "";
                }
            }

            populateSubtypeSelect();
            updateDescriptions();
        }

        panInput.addEventListener("input", () => {
            panInput.value = cleanPAN(panInput.value);
            refreshUI();
            if (document.activeElement === entityInput) renderSuggestions();
        });

        if (panExemptedToggle) {
            panExemptedToggle.addEventListener("change", () => {
                const labelFormat = document.getElementById("labelFormat");
                if (panExemptedToggle.checked) {
                    panInput.style.display = "none";
                    if (labelFormat) labelFormat.style.display = "none";
                    exemptionContainer.style.display = "flex";
                } else {
                    panInput.style.display = "block";
                    if (labelFormat) labelFormat.style.display = "";
                    exemptionContainer.style.display = "none";
                }
                refreshUI();
                if (document.activeElement === entityInput) renderSuggestions();
            });
        }

        if (exemptionCategorySelect) {
            exemptionCategorySelect.addEventListener("change", () => {
                populateExemptionSubcategory();
                refreshUI();
                if (document.activeElement === entityInput) renderSuggestions();
            });
        }

        if (exemptionSubcategorySelect) {
            exemptionSubcategorySelect.addEventListener("change", () => {
                refreshUI();
                if (document.activeElement === entityInput) renderSuggestions();
            });
        }

        showAllToggle.addEventListener("change", () => {
            refreshUI();
            renderSuggestions();
        });

        entityInput.addEventListener("input", () => {
            selectedEntity = null;
            selectedSubtype = null;
            populateSubtypeSelect();
            updateDescriptions();
            renderSuggestions();
        });

        entityInput.addEventListener("focus", renderSuggestions);

        document.addEventListener("click", e => {
            if (!autocomplete.contains(e.target) && e.target !== entityInput) {
                autocomplete.classList.remove("show");
            }
            const modal = document.getElementById('descModal');
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('descModal').style.display = "none";
        });

        subtypeSelect.addEventListener("change", () => {
            if (!selectedEntity) return;
            selectedSubtype = selectedEntity.subtypes.find(s => s.id === subtypeSelect.value) || null;
            updateDescriptions();
        });

        const langSelect = document.getElementById("langSelect");
        if (langSelect) {
            langSelect.value = currentLang;
            langSelect.addEventListener("change", (e) => {
                currentLang = e.target.value;
                localStorage.setItem("adwitiya_lang", currentLang);
                translateUI();
                refreshUI();
            });
        }

        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");

        function updateThemeUI() {
            document.documentElement.setAttribute("data-theme", currentTheme);
            if (themeIcon) {
                themeIcon.textContent = currentTheme === "light" ? "🌙" : "☀️";
            }
            if (themeToggle) {
                const titleTextEn = currentTheme === "light" ? "Switch to Dark Theme" : "Switch to Light Theme";
                const titleTextHi = currentTheme === "light" ? "डार्क थीम पर स्विच करें" : "लाइट थीम पर स्विच करें";
                themeToggle.setAttribute("title", currentLang === "hi" ? titleTextHi : titleTextEn);
            }
        }

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                currentTheme = currentTheme === "light" ? "dark" : "light";
                localStorage.setItem("adwitiya_theme", currentTheme);
                updateThemeUI();
            });
        }

        updateThemeUI();

        loadXML();
    </script>
</body>

</html>
